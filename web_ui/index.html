<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BG3 LLM — 赛博跑团终端</title>
  <style>
    :root {
      --bg-deep: #0a0e14;
      --bg-panel: #12181f;
      --bg-map: #1a222c;
      --border: #2a3f52;
      --text: #c8d4e0;
      --text-dim: #6b7c8f;
      --accent: #00d4aa;
      --system: #e8a838;
      --player: #6eb5ff;
      --shadowheart: #9b7ebd;
      --astarion: #c45c5c;
      --laezel: #5cb89b;
      --npc-default: #8fa3b8;
      --waypoint: #3d4f63;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Segoe UI", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      background: radial-gradient(ellipse at 20% 0%, #152028 0%, var(--bg-deep) 55%);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* ----- 左侧地图 60% ----- */
    .map-panel {
      width: 60%;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      border-right: 2px solid var(--border);
      background: linear-gradient(180deg, #0f1419 0%, var(--bg-panel) 100%);
    }

    .location-bar {
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      background: rgba(0, 212, 170, 0.06);
      font-variant: small-caps;
    }

    .location-bar span {
      color: var(--text);
      font-weight: 600;
    }

    #map-container {
      flex: 1;
      position: relative;
      margin: 1rem;
      background: var(--bg-map);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    /* 网格纹理 */
    #map-container::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(42, 63, 82, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42, 63, 82, 0.15) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .waypoint {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--waypoint);
      border: 2px solid #5a7088;
      transform: translate(-50%, -50%);
      z-index: 1;
      box-shadow: 0 0 12px rgba(90, 112, 136, 0.4);
    }

    .waypoint-label {
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      margin-top: 6px;
      font-size: 0.65rem;
      color: var(--text-dim);
      white-space: nowrap;
      pointer-events: none;
      font-family: ui-monospace, monospace;
    }

    .entity-token {
      position: absolute;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 2px #000;
      border: 2px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
      transition: top 1s ease, left 1s ease;
      cursor: default;
    }

    .entity-token .entity-name {
      position: absolute;
      bottom: -1.35rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      text-shadow: 0 0 4px #000;
      pointer-events: none;
    }

    /* ----- 右侧对话 40% ----- */
    .chat-panel {
      width: 40%;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
    }

    .chat-header {
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.08em;
    }

    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .msg {
      margin-bottom: 0.85rem;
      padding: 0.5rem 0.65rem;
      border-radius: 3px;
      border-left: 3px solid transparent;
    }

    .msg-player {
      border-left-color: var(--player);
      background: rgba(110, 181, 255, 0.08);
    }

    .msg-player .label {
      color: var(--player);
      font-size: 0.72rem;
      margin-bottom: 0.25rem;
    }

    .msg-npc {
      border-left-color: var(--npc-default);
      background: rgba(143, 163, 184, 0.06);
    }

    .msg-npc .label {
      font-size: 0.72rem;
      margin-bottom: 0.25rem;
    }

    .msg-system {
      border-left-color: var(--system);
      background: rgba(232, 168, 56, 0.08);
      font-family: ui-monospace, monospace;
      font-size: 0.82rem;
      color: #e8c878;
    }

    .msg-system .label {
      color: var(--system);
      font-size: 0.7rem;
      margin-bottom: 0.25rem;
    }

    .chat-input-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      background: #0e1318;
    }

    #user-input {
      flex: 1;
      padding: 0.55rem 0.75rem;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
    }

    #user-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(0, 212, 170, 0.25);
    }

    #user-input:disabled {
      opacity: 0.55;
    }

    #send-btn {
      padding: 0.55rem 1rem;
      background: linear-gradient(180deg, #1e3d35 0%, #152a24 100%);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      min-width: 88px;
    }

    #send-btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #2a5248 0%, #1a3830 100%);
    }

    #send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .idle-hint {
      padding: 0.35rem 1rem;
      font-size: 0.7rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="map-panel">
      <div class="location-bar">当前位置 · <span id="current-location">—</span></div>
      <div id="map-container">
        <!-- 地标由 JS 注入 -->
      </div>
    </section>
    <section class="chat-panel">
      <div class="chat-header">对话记录 / 系统日志</div>
      <div id="chat-log"></div>
      <div class="idle-hint">挂机：30 秒无操作将触发同伴闲聊（trigger_idle_banter）</div>
      <div class="chat-input-row">
        <input type="text" id="user-input" placeholder="输入指令或对白…" autocomplete="off" />
        <button type="button" id="send-btn">发送</button>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "http://localhost:8000/api/chat";

    /** 语义地标 → 地图百分比坐标（与后端 environment_objects key 对齐） */
    const WAYPOINT_POS = {
      camp_center: { left: 50, top: 50 },
      camp_fire: { left: 70, top: 30 },
      iron_chest: { left: 20, top: 80 },
    };

    /** NPC id → 代表色（hex，便于 style 与边框） */
    const SPEAKER_HEX = {
      shadowheart: "#9b7ebd",
      astarion: "#c45c5c",
      laezel: "#5cb89b",
      player: "#6eb5ff",
      dm: "#8899aa",
    };

    let partyStatus = {};
    const entityTokens = new Map();
    let idleTimer = null;
    const IDLE_MS = 30000;

    function speakerColor(id) {
      const k = (id || "").toLowerCase();
      return SPEAKER_HEX[k] || "#6b8fae";
    }

    function getNpcDisplayName(id) {
      const m = {
        shadowheart: "影心",
        astarion: "阿斯代伦",
        laezel: "莱埃泽尔",
        player: "玩家",
      };
      return m[id.toLowerCase()] || id;
    }

    /** 同地标多个单位时的像素偏移，避免重叠 */
    function stackOffset(index, total) {
      if (total <= 1) return { x: 0, y: 0 };
      const r = 22;
      const angle = (index / total) * Math.PI * 2 - Math.PI / 2;
      return { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
    }

    function buildWaypoints() {
      const map = document.getElementById("map-container");
      const frag = document.createDocumentFragment();
      Object.entries(WAYPOINT_POS).forEach(([id, pos]) => {
        const dot = document.createElement("div");
        dot.className = "waypoint";
        dot.style.left = pos.left + "%";
        dot.style.top = pos.top + "%";
        dot.dataset.waypointId = id;
        const lab = document.createElement("span");
        lab.className = "waypoint-label";
        lab.textContent = id;
        dot.appendChild(lab);
        frag.appendChild(dot);
      });
      map.appendChild(frag);
    }

    function updateMap(party) {
      partyStatus = party && typeof party === "object" ? { ...party } : {};
      const map = document.getElementById("map-container");

      const entries = Object.entries(partyStatus).filter(
        ([id, d]) => id !== "player" && d && typeof d === "object" && d.position
      );

      const byPos = {};
      entries.forEach(([id, data]) => {
        const pos = data.position;
        if (!byPos[pos]) byPos[pos] = [];
        byPos[pos].push({ id, data });
      });

      const seen = new Set();
      entries.forEach(([id, data]) => {
        seen.add(id);
        const posKey = data.position || "camp_center";
        const base = WAYPOINT_POS[posKey] || WAYPOINT_POS.camp_center;
        const group = byPos[posKey] || [];
        const idx = group.findIndex((g) => g.id === id);
        const off = stackOffset(idx, group.length);

        const left = "calc(" + base.left + "% + " + off.x + "px)";
        const top = "calc(" + base.top + "% + " + off.y + "px)";

        let token = entityTokens.get(id);
        if (!token) {
          token = document.createElement("div");
          token.className = "entity-token";
          token.dataset.entityId = id;
          const ini = document.createElement("span");
          ini.className = "entity-initials";
          const nameEl = document.createElement("span");
          nameEl.className = "entity-name";
          token.appendChild(ini);
          token.appendChild(nameEl);
          map.appendChild(token);
          entityTokens.set(id, token);
        }
        token.style.background = speakerColor(id);
        token.style.left = left;
        token.style.top = top;
        token.querySelector(".entity-initials").textContent = id.slice(0, 2).toUpperCase();
        token.querySelector(".entity-name").textContent = getNpcDisplayName(id);
      });

      entityTokens.forEach((el, id) => {
        if (!seen.has(id)) {
          el.remove();
          entityTokens.delete(id);
        }
      });
    }

    function appendChat(htmlClass, label, text) {
      const log = document.getElementById("chat-log");
      const div = document.createElement("div");
      div.className = "msg " + htmlClass;
      const lab = document.createElement("div");
      lab.className = "label";
      lab.textContent = label;
      div.appendChild(lab);
      const body = document.createElement("div");
      body.textContent = text;
      div.appendChild(body);
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function updateChatLog(data, userLine) {
      if (userLine) {
        appendChat("msg-player", "你", userLine);
      }
      const responses = data.responses || [];
      const log = document.getElementById("chat-log");
      responses.forEach((r) => {
        const sp = (r.speaker || "npc").toLowerCase();
        const div = document.createElement("div");
        div.className = "msg msg-npc";
        div.style.borderLeftColor = speakerColor(sp);
        const lab = document.createElement("div");
        lab.className = "label";
        lab.style.color = speakerColor(sp);
        lab.textContent = getNpcDisplayName(sp) + " · " + sp;
        div.appendChild(lab);
        const body = document.createElement("div");
        body.textContent = r.text || "";
        div.appendChild(body);
        log.appendChild(div);
      });
      (data.journal_events || []).forEach((line) => {
        appendChat("msg-system", "◎ 系统", line);
      });
      log.scrollTop = log.scrollHeight;
    }

    function setLoading(loading) {
      const inp = document.getElementById("user-input");
      const btn = document.getElementById("send-btn");
      inp.disabled = loading;
      btn.disabled = loading;
      btn.textContent = loading ? "思考中…" : "发送";
    }

    function resetIdleTimer() {
      if (idleTimer) clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        sendMessage("", "trigger_idle_banter");
      }, IDLE_MS);
    }

    async function sendMessage(text, intent) {
      const userLine = (text || "").trim();
      const intentVal = intent == null || intent === "" ? null : String(intent).trim();
      if (!userLine && !intentVal) return;

      setLoading(true);
      const body = {
        user_input: userLine,
        intent: intentVal || null,
        session_id: "web_ui_session",
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.text();
          appendChat("msg-system", "◎ 错误", "HTTP " + res.status + ": " + err);
          return;
        }
        const data = await res.json();

        document.getElementById("current-location").textContent =
          data.current_location || "—";

        updateChatLog(data, userLine || null);

        updateMap(data.party_status || {});
      } catch (e) {
        appendChat("msg-system", "◎ 网络", String(e.message || e));
      } finally {
        setLoading(false);
        resetIdleTimer();
      }
    }

    function onSend() {
      const inp = document.getElementById("user-input");
      const t = inp.value.trim();
      inp.value = "";
      sendMessage(t, null);
    }

    document.getElementById("send-btn").addEventListener("click", onSend);
    document.getElementById("user-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") onSend();
    });

    buildWaypoints();
    updateMap({});
    resetIdleTimer();

    appendChat("msg-system", "◎ 终端", "连接 " + API_URL + " — 输入对话或等待挂机事件。");
  </script>
</body>
</html>
