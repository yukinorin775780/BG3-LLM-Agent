<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BG3 LLM | 赛博羊皮纸战术桌</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="map-stage" class="map-stage" aria-label="2.5D 战术地图">
    <div id="map-container" class="map-container"></div>
  </div>

  <div id="initiative-tracker" class="initiative-tracker is-hidden" aria-live="polite" aria-label="先攻顺位条">
    <div class="initiative-frame">
      <span class="initiative-title">Initiative</span>
      <div id="initiative-list" class="initiative-list"></div>
    </div>
  </div>

  <button type="button" id="tactical-toggle-btn" class="tactical-toggle-btn" aria-controls="tactical-pause-overlay" aria-expanded="false">
    战术菜单 <span>Space / Tab</span>
  </button>

  <div id="tactical-pause-overlay" class="tactical-pause-overlay is-hidden" aria-hidden="true">
  <div class="app-shell">
    <header class="topbar panel-frame">
      <div class="brand-block">
        <p class="eyebrow">BG3 LLM / Tactical Console</p>
        <h1>赛博羊皮纸战术桌</h1>
      </div>
      <div class="status-strip">
        <div class="status-cell">
          <span class="status-label">Current Location</span>
          <strong id="current-location">未知区域</strong>
        </div>
        <div class="status-cell">
          <span class="status-label">Net Link</span>
          <strong id="network-state" data-state="idle">链路待命</strong>
        </div>
        <div class="status-cell">
          <span class="status-label">Turn</span>
          <strong id="turn-counter">00</strong>
        </div>
      </div>
    </header>

    <main class="battlefield-layout">
      <div class="left-column">
        <section class="world-panel panel-frame">
          <div class="panel-header">
            <div>
              <p class="panel-eyebrow">Main Log / World View</p>
              <h2>主叙事区</h2>
            </div>
            <div class="panel-chip-row" id="log-filter-bar" aria-label="日志筛选">
              <button type="button" class="panel-chip log-filter-btn is-active" data-filter="dialogue" aria-pressed="true">对话</button>
              <button type="button" class="panel-chip log-filter-btn is-active" data-filter="system" aria-pressed="true">系统事件</button>
              <button type="button" class="panel-chip log-filter-btn is-active" data-filter="narration" aria-pressed="true">掷骰旁白</button>
            </div>
          </div>

          <div id="world-log" class="world-log" aria-live="polite" aria-label="主叙事日志"></div>
        </section>

        <footer class="console panel-frame">
          <div class="console-head">
            <div>
              <p class="panel-eyebrow">Command Input</p>
              <h2>控制台</h2>
            </div>
            <span class="console-subtitle">快捷动作会自动写入并执行指令</span>
          </div>

          <div class="shortcut-bar" aria-label="快捷动作">
            <button type="button" class="shortcut-btn" data-command="查看周围">查看周围</button>
            <button type="button" class="shortcut-btn" data-command="查看背包">查看背包</button>
            <button type="button" class="shortcut-btn" data-command="检查铁箱">检查铁箱</button>
            <button type="button" class="shortcut-btn" data-command="靠近篝火">靠近篝火</button>
            <button type="button" class="shortcut-btn" data-command="汇报当前队伍状态">队伍状态</button>
            <button type="button" class="shortcut-btn shortcut-btn--danger" data-command="我准备战斗，汇报当前可用的战斗动作">战斗动作</button>
          </div>

          <div class="console-body">
            <label class="sr-only" for="user-input">输入你的指令</label>
            <textarea
              id="user-input"
              rows="3"
              placeholder="输入对白、行动或战术指令……"
              autocomplete="off"
            ></textarea>

            <div class="console-actions">
              <p class="console-hint">30 秒无动作将触发同伴闲聊 `trigger_idle_banter`</p>
              <button type="button" id="send-btn" class="send-btn">执行指令</button>
            </div>
          </div>
        </footer>
      </div>

      <aside class="side-column sidebar-container">
        <section class="party-panel panel-frame">
          <div class="panel-header">
            <div>
              <p class="panel-eyebrow">Party Roster</p>
              <h2>队伍状态栏</h2>
            </div>
            <span id="party-count" class="panel-badge">0 名单位</span>
          </div>

          <div class="panel-body">
            <div id="party-roster" class="party-roster" aria-label="队伍状态"></div>
          </div>
        </section>

        <section class="state-panel panel-frame">
          <div class="panel-header">
            <div>
              <p class="panel-eyebrow">Environment Objects</p>
              <h2>场景对象区</h2>
            </div>
            <span id="environment-count" class="panel-badge">0 个对象</span>
          </div>

          <div class="panel-body">
            <div class="state-stack">
              <section class="subpanel">
                <div class="subpanel-header">
                  <h3>场景对象</h3>
                </div>
                <div class="subpanel-body">
                  <div id="environment-list" class="environment-list" aria-label="环境物品"></div>
                </div>
              </section>
            </div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <div id="loot-modal" class="loot-modal hidden" aria-hidden="true" role="dialog" aria-labelledby="loot-title">
    <div class="loot-panel panel-frame">
      <div class="loot-head">
        <div>
          <p class="panel-eyebrow">Container Access</p>
          <h3 id="loot-title">铁箱内容物</h3>
        </div>
        <button type="button" id="close-loot-btn" class="loot-close" aria-label="关闭搜刮面板">关闭</button>
      </div>

      <div id="loot-items" class="loot-grid"></div>

      <div class="loot-actions">
        <button type="button" id="loot-all-btn" class="loot-confirm">全部拾取</button>
      </div>
    </div>
  </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js" defer></script>
  <script src="./game.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
