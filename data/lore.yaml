necromancer_journal_1:
  title: "残破的实验日志"
  raw_text: "实验记录：第42天。我那一整瓶珍贵的《狐之狡诈》药水被一只地精喝掉了！它开始用通用语纠正我的法术发音。我把它锁在主控室。为防止狂暴地精破坏溶剂，我在走廊布下毒气。通行密语是：米尔寇的叹息 (Myrkul's Breath)。"

necromancer_diary_1:
  title: "沾满血污的日记本"
  raw_text: "实验记录第 42 天：我终于把那只叫 Gribbo 的蠢地精和毒气陷阱连接起来了。只要通道的毒气触发，他就会警觉。那把沉重的铁钥匙，我安全地锁在了密室的箱子里。希望那些愚蠢的寻宝者会被毒气融化。"
