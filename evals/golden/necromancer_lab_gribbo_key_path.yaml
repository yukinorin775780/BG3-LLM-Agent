    generation:
      - >-
        {"internal_monologue":"","reply":"拿去吧，别烦我。","trigger_combat":false,
        "state_changes":{"patience_delta":0,"fear_delta":0},
        "physical_action":{"action_type":"transfer_item","source_id":"gribbo","target_id":"player",
