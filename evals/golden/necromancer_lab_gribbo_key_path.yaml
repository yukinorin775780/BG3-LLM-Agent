      - 玩家贴着墙边靠近了大门，铁锁在钥匙孔里发出轻响。
      - 沉重橡木门被钥匙解开，门轴轰鸣，通路终于打开。
steps:
  - id: start_dialogue_in_necromancer_lab
    user_input: 我想和格里波谈谈。
    intent: chat
    expected:
      state:
        equals:
          game_state.map_data.id: necromancer_lab
          game_state.active_dialogue_target: gribbo
  - id: negotiate_gribbo_for_key_via_event_drain
    user_input: 把钥匙给我。
    intent: chat
    expected:
      responses:
        exact:
          - speaker: gribbo
            text: 拿去吧，别烦我。
      state:
        equals:
          game_state.map_data.id: necromancer_lab
          game_state.player_inventory.heavy_iron_key: 1
          game_state.entities.gribbo.inventory.scroll_of_firebolt: 1
          game_state.pending_events: []
      telemetry:
        events_contains:
          - event_name: event_drain
            payload:
              event_count: 1
              transaction_event_count: 1
              transaction_accepted_count: 1
  - id: approach_heavy_oak_door
    user_input: 移动到 13,11。
    intent: chat
    expected:
      state:
        equals:
          game_state.map_data.id: necromancer_lab
          game_state.entities.player.x: 13
          game_state.entities.player.y: 11
  - id: open_heavy_oak_door_and_clear_demo
    user_input: 用 heavy_iron_key 打开 heavy_oak_door_1。
    intent: chat
    expected:
      state:
        equals:
          game_state.map_data.id: necromancer_lab
          game_state.entities.heavy_oak_door_1.is_open: true
          game_state.demo_cleared: true
expected:
  telemetry:
    events_contains:
      - event_name: event_drain
        payload:
          transaction_event_count: 1
  retrieval:
    max_hits: 4
  budget:
    max_total_tokens: 0
